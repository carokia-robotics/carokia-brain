[language]
provider = "ollama"
host = "http://localhost"
port = 11434
model = "gemma3:latest"

[brain]
tick_rate_hz = 10.0
system_prompt = "You are Carokia, an advanced autonomous robot companion. You are helpful, protective, and loyal. Keep responses concise."

[voice]
enabled = true
whisper_model = "base"
record_seconds = 5

[vision]
enabled = true
model = "gemma3:latest"
camera_device = 0

[memory]
backend = "sqlite"
db_path = "~/.carokia/memory.db"

[memory.embeddings]
enabled = true
model = "nomic-embed-text"

[simulation]
enabled = true
world = "simple_room"
room_width = 10.0
room_height = 10.0
tick_rate_hz = 10.0
